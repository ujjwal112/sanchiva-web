# Render Blueprint — one web service + managed Postgres
# https://render.com/docs/blueprint-spec
# After deploy: open the service Shell and run: npm run db:init --prefix server
# Or set a one-off job / use the start script that applies schema.

services:
  - type: web
    name: sanchiva
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: npm run db:init --prefix server && npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: sanchiva-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: "*"

databases:
  - name: sanchiva-db
    plan: free
    databaseName: sanchiva
    user: sanchiva
